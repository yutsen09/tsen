<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sketchfab Model - Tsen</title>
    <style>
        body {
            background-color: #f0f2f5;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* 這是你剛才提供的樣式 */
        .sketchfab-container {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            font-family: sans-serif;
        }
        .sketchfab-embed-wrapper iframe {
            width: 100%;
            height: 500px;
            border: none;
            display: block; /* 移除 iframe 下方微小間隙 */
        }
        .model-info {
            padding: 15px;
            background: #f8f9fa;
            font-size: 14px;
            border-top: 1px solid #eee;
            text-align: center;
        }
        .model-info a {
            color: #1caad9;
            text-decoration: none;
            font-weight: bold;
        }
        .back-link {
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="sketchfab-container">
        <div class="sketchfab-embed-wrapper">
            <iframe 
                title="Tsen" 
                allowfullscreen 
                mozallowfullscreen="true" 
                webkitallowfullscreen="true" 
                allow="autoplay; fullscreen; xr-spatial-tracking" 
                xr-spatial-tracking 
                execution-while-out-of-viewport 
                execution-while-not-rendered 
                web-share 
                src="https://sketchfab.com/models/f140ccec81cb46299e74eda376b9ae37/embed?autostart=1">
            </iframe>
        </div>
        
        <div class="model-info">
            <span>3D Model: </span>
            <a href="https://sketchfab.com/3d-models/tsen-f140ccec81cb46299e74eda376b9ae37" target="_blank">Tsen</a>
            <span> by </span>
            <a href="https://sketchfab.com/yutsencheng" target="_blank">yutsencheng</a>
        </div>
    </div>

    <div class="back-link">
        <a href="index.html" style="color: #666; text-decoration: none;">← 回到首頁</a>
    </div>

</body>
</html>
